<!DOCTYPE html>
<html>
<head>
    <title>HakaiChain SDK</title>
</head>
<body>
    <h2>Autenticação com Ethereum</h2>
    <form id="walletForm">
        <label for="email">Email:</label>
        <input type="email" id="email" required><br><br>
        <label for="telefone">Telefone:</label>
        <input type="text" id="telefone" required><br><br>
        <button type="submit">Gerar Carteira</button>
    </form>

    <div id="result" style="margin-top:20px; display:none;">
        <h3>Carteira Gerada</h3>
        <p><strong>Endereço:</strong> <span id="address"></span></p>
        <p><strong>Chave Privada:</strong> <span id="privateKey"></span></p>
        <p><strong>Mnemonic:</strong> <span id="mnemonic"></span></p>
        <p style="color: red;"><strong>Guarde essas informações com segurança!</strong></p>
    </div>

    <script>
        document.getElementById('walletForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const telefone = document.getElementById('telefone').value;

            const response = await fetch('/gerar-carteira', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, telefone })
            });

            const data = await response.json();

            document.getElementById('address').textContent = data.address;
            document.getElementById('privateKey').textContent = data.private_key;
            document.getElementById('mnemonic').textContent = data.mnemonic;
            document.getElementById('result').style.display = 'block';
        });
    </script>
</body>
</html>
