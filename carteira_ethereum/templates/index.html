<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criar Carteira</title>
</head>
<body>
    <h1>Criar Nova Carteira Ethereum</h1>
    <form action="/criar" method="POST">
        <label>E-mail:</label><br>
        <input type="email" name="email" required><br><br>

        <label>Telefone (com DDD):</label><br>
        <input type="text" name="telefone" required><br><br>

        <label>Frase de Segurança:</label><br>
        <input type="text" name="frase" required><br><br>

        <button type="submit">Criar Carteira</button>
    </form>
</body>
</html>
